<!-- shared-filter.component.html -->
<form [formGroup]="filterForm">
  <ng-container [ngSwitch]="filterType">
    <ng-container *ngSwitchDefault>
      <mat-form-field [id]="key">
        <mat-label
          >{{ label }}
          <span *ngIf="appConfig.enterToApply" class="enter-hint">Enter to apply</span>
        </mat-label>
        <input
          matInput
          #input
          type="text"
          (input)="onInput($event)"
          (keydown.enter)="onApplyEnter($event)"
          [matTooltip]="tooltip"
          matTooltipPosition="after"
          formControlName="textField"
        />
      </mat-form-field>
    </ng-container>

    <ng-container *ngSwitchCase="'dateRange'">
      <mat-form-field
        class="date-range-field"
        [matTooltip]="tooltip"
        matTooltipPosition="after"
        [id]="key"
      >
        <mat-label
          >{{ label }}
          <span *ngIf="appConfig.enterToApply" class="enter-hint">Enter to apply</span>
        </mat-label>
        <mat-date-range-input
          formGroupName="dateRangeField"
          [rangePicker]="picker"
        >
          <input
            matStartDate
            (dateChange)="dateChanged($event, 'begin')"
            formControlName="start"
            data-cy="creation-time-begin"
            (keydown.enter)="onApplyEnter($event)"
          />
          <input
            matEndDate
            (dateChange)="dateChanged($event, 'end')"
            formControlName="end"
            data-cy="creation-time-end"
            (keydown.enter)="onApplyEnter($event)"
          />
        </mat-date-range-input>
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-date-range-picker #picker></mat-date-range-picker>
      </mat-form-field>
    </ng-container>

    <ng-container *ngSwitchCase="'checkbox'">
      <div
        class="collapsible-filter-wrapper"
        [class.collapsed]="collapsible && collapsed"
      >
        <mat-label
          class="filter-title"
          [class.clickable]="collapsible"
          (click)="toggleCollapse()"
          >{{ label | translate: localization }}
          <span *ngIf="shouldShowBadge" class="filter-badge">{{
            badgeCount
          }}</span
          ><mat-icon *ngIf="collapsible" class="icon-collapse">
            {{ collapsed ? "expand_more" : "expand_less" }}
          </mat-icon></mat-label
        >
        <mat-form-field
          *ngIf="showCheckboxSearch"
          appearance="outline"
          class="facet-search"
          floatLabel="always"
        >
          <mat-label>Find filter</mat-label>
          <input
            matInput
            type="search"
            formControlName="textField"
            placeholder="{{ placeholder }}"
          />
        </mat-form-field>
        <ng-container *ngIf="visibleFacetCounts?.length > 0; else noItems">
          <div class="checkbox-list">
            <mat-checkbox
              *ngFor="let field of visibleFacetCounts; trackBy: trackById"
              [checked]="
                filterForm.get('selectedIds')!.value?.includes(field._id)
              "
              (change)="onToggleCheckbox(field._id, $event.checked)"
            >
              {{ field.label ?? field._id }} ({{ field.count }})
            </mat-checkbox>
          </div>
          <div class="show-more-btn" *ngIf="hasMore">
            <button mat-button (click)="onShowMore()">Show more...</button>
          </div>
        </ng-container>
        <ng-template #noItems>
          <div class="empty-text">No options found</div>
        </ng-template>
      </div>

      <mat-divider />
    </ng-container>

    <ng-container *ngSwitchCase="'multiSelect'">
      <multiselect-filter
        [key]="key"
        [label]="label"
        [tooltip]="tooltip"
        (selectionChange)="onSelectionChange($event)"
        [facetCounts$]="facetCounts$"
        [currentFilter$]="currentFilter$"
        (keydown.enter)="onApplyEnter($event)"
      ></multiselect-filter>
    </ng-container>
    <ng-container *ngSwitchCase="'number'">
      <ngx-numeric-range-form-field
        formControlName="numberRange"
        [label]="label"
        [key]="key"
        (numericRangeChanged)="onNumericRangeChange($event)"
      ></ngx-numeric-range-form-field>
    </ng-container>
  </ng-container>
</form>
